name: Daily Market Scan

on:
  schedule:
    # 07:00 CET = 06:00 UTC (winter) / 05:00 UTC (summer)
    - cron: '0 6 * * 1-5'
    # 12:00 CET = 11:00 UTC (winter) / 10:00 UTC (summer)
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scan
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/daily_scan.py

      - name: Commit and push results
        run: |
          git config user.name "Unitron Bot"
          git config user.email "unitron-bot@users.noreply.github.com"
          git add storage/latest_scan.json
          git diff --cached --quiet || git commit -m "Auto-scan $(date -u +%Y-%m-%d\ %H:%M) UTC"
          git push
